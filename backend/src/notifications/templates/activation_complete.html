<html lang="en">
<head>
  <title>Clinic CRM account activated</title>
</head>
<body style="margin:0;padding:0;background:#f6f8fb;font-family:Arial,sans-serif;color:#1f2937;">
<div style="border:1px solid #e5e7eb;border-radius:8px;padding:20px;max-width:480px;margin:40px auto;background:#ffffff;">
  <h2 style="margin:0 0 16px;color:#0f766e;font-size:22px;">Account activated</h2>
  <p style="line-height:1.6;font-size:16px;">
    Your Clinic CRM account for <strong>{{ email }}</strong> is active.
  </p>
  <p style="margin:24px 0;text-align:center;">
    <a href="{{ login_link }}" style="display:inline-block;background:#0f766e;color:#ffffff;text-decoration:none;font-size:16px;padding:10px 18px;border-radius:4px;">
      Log in
    </a>
  </p>
</div>
</body>
</html>
