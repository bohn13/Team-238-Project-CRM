<html lang="en">
<body style="margin:0;padding:0;background:#f6f8fb;font-family:Arial,sans-serif;color:#1f2937;">
<div
    style="border:1px solid #e5e7eb;border-radius:8px;padding:20px;max-width:480px;margin:40px auto;background:#ffffff;">
  <h2 style="margin:0 0 16px;color:#0f766e;font-size:22px;">Activate your account</h2>
  <p style="line-height:1.6;font-size:16px;">
    A Clinic CRM account was created for <strong>{{ email }}</strong>.
  </p>
  <p style="line-height:1.6;font-size:16px;">
    Use the link below to activate it.
  </p>
  <p style="margin:24px 0;text-align:center;">
    <a href="{{ activation_link }}"
       style="display:inline-block;background:#0f766e;color:#ffffff;text-decoration:none;font-size:16px;padding:10px 18px;border-radius:4px;">
      Activate account
    </a>
  </p>
  <p style="line-height:1.6;font-size:14px;color:#6b7280;">
    Ignore this email if you did not request this account.
  </p>
</div>
</body>
</html>
