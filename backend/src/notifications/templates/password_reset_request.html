<html lang="en">
<head>
  <title>Clinic CRM password reset</title>
</head>
<body style="margin:0;padding:0;background:#f6f8fb;font-family:Arial,sans-serif;color:#1f2937;">
<div style="border:1px solid #e5e7eb;border-radius:8px;padding:20px;max-width:480px;margin:40px auto;background:#ffffff;">
  <h2 style="margin:0 0 16px;color:#b45309;font-size:22px;">Reset your password</h2>
  <p style="line-height:1.6;font-size:16px;">
    A password reset was requested for <strong>{{ email }}</strong>.
  </p>
  <p style="margin:24px 0;text-align:center;">
    <a href="{{ reset_link }}" style="display:inline-block;background:#b45309;color:#ffffff;text-decoration:none;font-size:16px;padding:10px 18px;border-radius:4px;">
      Reset password
    </a>
  </p>
  <p style="line-height:1.6;font-size:14px;color:#6b7280;">
    Ignore this email if you did not request a password reset.
  </p>
</div>
</body>
</html>
